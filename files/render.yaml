services:
  - type: web
    name: soundtoscore
    env: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt
      apt-get update
      apt-get install -y fluidsynth ffmpeg

    startCommand: uvicorn app:app --host 0.0.0.0 --port 10000

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
