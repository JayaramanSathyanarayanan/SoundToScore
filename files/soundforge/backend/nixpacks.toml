[phases.setup]
nixPkgs = ["ffmpeg", "fluidsynth", "python311", "libsndfile", "curl"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "mkdir -p soundfonts",
  "curl -L --retry 5 --retry-delay 3 'https://github.com/mrbumpy409/GeneralUser-GS/raw/master/GeneralUser%20GS%20v1.471.sf2' -o soundfonts/GeneralUser_GS.sf2 || echo 'SF download failed, will retry at runtime'"
]

[start]
cmd = "uvicorn app:app --host 0.0.0.0 --port $PORT"
